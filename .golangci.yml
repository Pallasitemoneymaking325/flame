version: "2"
run:
  # CI currently provides golangci-lint binaries built with Go 1.24.
  # Keep this at 1.24 until golangci-lint ships with a newer toolchain.
  go: "1.24"
linters:
  enable:
    - godot
    - misspell
    - unconvert
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
